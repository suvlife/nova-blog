<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Blog - 调试</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/admin/css/admin.css">
  <style>
    #debug-log { position:fixed; bottom:0; left:0; right:0; max-height:40vh; overflow-y:auto; background:rgba(0,0,0,0.9); color:#0f0; font:12px/1.5 monospace; padding:10px; z-index:99999; display:none; }
    #debug-log.show { display:block; }
    #debug-toggle { position:fixed; bottom:10px; right:10px; z-index:99999; background:#6C5CE7; color:#fff; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; font-size:12px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toast-container"></div>
  <button id="debug-toggle" onclick="document.getElementById('debug-log').classList.toggle('show')">调试日志</button>
  <div id="debug-log"></div>

  <script>
    // 拦截所有错误
    const debugLog = document.getElementById('debug-log');
    window.__debugMessages = [];
    function dmsg(text, type) {
      window.__debugMessages.push(text);
      const line = document.createElement('div');
      line.style.color = type === 'err' ? '#FF6B6B' : type === 'ok' ? '#00F5D4' : '#9D9DBF';
      line.textContent = new Date().toISOString().substr(11,8) + ' ' + text;
      debugLog.appendChild(line);
    }

    window.onerror = function(msg, url, line, col, err) {
      dmsg('UNCAUGHT ERROR: ' + msg + ' at ' + url + ':' + line + ':' + col, 'err');
      return false;
    };

    window.addEventListener('unhandledrejection', function(e) {
      dmsg('UNHANDLED REJECTION: ' + (e.reason?.message || e.reason), 'err');
    });

    // 拦截 console.error
    const origError = console.error;
    console.error = function(...args) {
      dmsg('CONSOLE.ERROR: ' + args.join(' '), 'err');
      origError.apply(console, args);
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js" 
    onload="dmsg('✅ marked.js loaded', 'ok')" 
    onerror="dmsg('❌ marked.js FAILED', 'err')"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"
    onload="dmsg('✅ highlight.js loaded', 'ok')"
    onerror="dmsg('❌ highlight.js FAILED', 'err')"></script>

  <script src="/js/store/index.js" onload="dmsg('✅ store loaded, NovaStore=' + typeof NovaStore, 'ok')" onerror="dmsg('❌ store FAILED', 'err')"></script>
  <script src="/js/api/index.js" onload="dmsg('✅ api loaded, NovaApi=' + typeof NovaApi, 'ok')" onerror="dmsg('❌ api FAILED', 'err')"></script>
  <script src="/js/router/index.js" onload="dmsg('✅ router loaded, NovaRouter=' + typeof NovaRouter, 'ok')" onerror="dmsg('❌ router FAILED', 'err')"></script>
  <script src="/js/utils/helpers.js" onload="dmsg('✅ helpers loaded, NovaHelpers=' + typeof NovaHelpers, 'ok')" onerror="dmsg('❌ helpers FAILED', 'err')"></script>
  <script src="/js/components/editor.js" onload="dmsg('✅ editor loaded', 'ok')" onerror="dmsg('❌ editor FAILED', 'err')"></script>
  <script src="/js/pages/front.js" onload="dmsg('✅ front loaded, NovaFront=' + typeof NovaFront, 'ok')" onerror="dmsg('❌ front FAILED', 'err')"></script>
  <script src="/js/pages/admin.js" onload="dmsg('✅ admin loaded, NovaAdmin=' + typeof NovaAdmin, 'ok')" onerror="dmsg('❌ admin FAILED', 'err')"></script>
  <script src="/js/app.js" onload="dmsg('✅ app loaded', 'ok'); setTimeout(function(){ dmsg('#app innerHTML length: ' + document.getElementById('app').innerHTML.length); dmsg('#app first 200: ' + document.getElementById('app').innerHTML.substring(0,200)); }, 2000);" onerror="dmsg('❌ app FAILED', 'err')"></script>
</body>
</html>
