# ============================================
# 生产部署工作流 - main 分支合并触发
# 部署后端 Worker + 前端 Pages，并进行健康检查验证
# ============================================
name: Deploy Production

on:
  push:
    branches: [main]

# 生产部署不允许并发，确保同一时间只有一个部署流程
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  # ------------------------------------------
  # 部署后端 Worker
  # ------------------------------------------
  deploy-backend:
    name: Deploy Backend (Worker)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 安装依赖
        run: npm ci

      # 执行 D1 数据库远程迁移（生产环境）
      - name: 执行 D1 数据库迁移（远程）
        working-directory: packages/backend
        run: npx wrangler d1 migrations apply blog-db --remote --env=production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # 部署 Cloudflare Worker（生产环境）
      - name: 部署 Worker
        working-directory: packages/backend
        run: npx wrangler deploy --env=production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # 设置 Worker Secrets（生产环境）
      - name: 设置 Worker Secrets
        working-directory: packages/backend
        run: |
          # 逐个设置生产环境所需的密钥
          echo "${{ secrets.JWT_SECRET }}" | npx wrangler secret put JWT_SECRET --env=production
          echo "${{ secrets.ADMIN_PASSWORD }}" | npx wrangler secret put ADMIN_PASSWORD --env=production
          echo "${{ secrets.R2_PUBLIC_ACCESS_KEY }}" | npx wrangler secret put R2_PUBLIC_ACCESS_KEY --env=production
          echo "${{ secrets.R2_SECRET_ACCESS_KEY }}" | npx wrangler secret put R2_SECRET_ACCESS_KEY --env=production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ------------------------------------------
  # 部署前端 Pages
  # ------------------------------------------
  deploy-frontend:
    name: Deploy Frontend (Pages)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 安装依赖
        run: npm ci

      # 构建前端（生产环境变量）
      - name: 构建前端
        run: npm run build:frontend
        env:
          VITE_API_URL: "https://api.blog.example.com"
          VITE_BLOG_NAME: "My Cloudflare Blog"

      # 部署到 Cloudflare Pages（生产环境）
      - name: 部署到 Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/frontend/dist --project-name=nova-blog-frontend --branch=main
          workingDirectory: "."

  # ------------------------------------------
  # 部署后验证
  # ------------------------------------------
  verify:
    name: Post-deploy Verification
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    steps:
      # 等待部署生效（Cloudflare 全球节点传播需要时间）
      - name: 等待部署生效
        run: sleep 30

      # 健康检查：后端 API /health 端点
      - name: 健康检查 - 后端 API /health
        run: |
          echo "正在检查后端 API 健康状态..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.blog.example.com/health)
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "后端健康检查失败！HTTP 状态码: $HTTP_STATUS"
            exit 1
          fi
          echo "后端健康检查通过！HTTP 状态码: $HTTP_STATUS"

      # 健康检查：前端首页 HTTP 200
      - name: 健康检查 - 前端首页
        run: |
          echo "正在检查前端首页..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://blog.example.com)
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "前端健康检查失败！HTTP 状态码: $HTTP_STATUS"
            exit 1
          fi
          echo "前端健康检查通过！HTTP 状态码: $HTTP_STATUS"

      # 部署失败时发送通知
      - name: 部署失败通知
        if: failure()
        run: |
          echo "=========================================="
          echo "生产部署验证失败！需要人工介入。"
          echo "=========================================="
          echo "请检查以下内容："
          echo "  1. Cloudflare Dashboard 中 Worker 和 Pages 的部署状态"
          echo "  2. D1 数据库迁移是否成功"
          echo "  3. Worker Secrets 是否正确设置"
          echo "  4. 自定义域名 DNS 解析是否正常"
          # 此处可集成 Slack/Discord/钉钉/飞书 通知
          # curl -X POST "$WEBHOOK_URL" -H 'Content-type: application/json' \
          #   --data '{"text":"生产部署验证失败，请立即检查！"}'
