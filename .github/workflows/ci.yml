# ============================================
# CI 工作流 - 持续集成（PR 触发）
# 用于 PR 合并前的代码质量检查和构建验证
# ============================================
name: CI

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

# 同一 PR 的多次推送只保留最新的检查
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ------------------------------------------
  # 代码质量检查：Lint + TypeScript 类型检查
  # ------------------------------------------
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 安装依赖
        run: npm ci

      # 缓存 node_modules 以加速后续工作流
      - name: 缓存 node_modules
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: 代码风格检查（Lint）
        run: npm run lint

      - name: 后端 TypeScript 类型检查
        run: npm run typecheck --workspace=packages/backend

  # ------------------------------------------
  # 构建验证：确保后端可以成功构建
  # ------------------------------------------
  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 安装依赖
        run: npm ci

      # 恢复 node_modules 缓存
      - name: 恢复 node_modules 缓存
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: 后端构建验证
        run: npm run build:backend

      - name: 前端构建验证
        run: npm run build:frontend
        env:
          VITE_API_URL: "https://api.blog.example.com"

      - name: 上传前端构建产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: packages/frontend/dist/
          retention-days: 1

      - name: 上传后端构建产物
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: packages/backend/dist/
          retention-days: 1
